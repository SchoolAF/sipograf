version: '3.8'

services:
  app:
    build: .
    container_name: posyandu-web-app
    restart: unless-stopped
    ports:
      - "8080:80" # Maps localhost:8080 to container port 80
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=secret
      - DB_NAME=dbsipograf1
      - DB_PORT=3306
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: posyandu-web-db
    restart: unless-stopped
    environment:
      # These credentials need to match the 'app' service environment variables
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=dbsipograf1
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically import the database schema on first startup
      # Note: Added 'z' for SELinux relabeling to prevent 'Permission denied'
      - "./init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z"

volumes:
  db_data:
